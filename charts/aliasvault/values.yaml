# Default values for aliasvault.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# AliasVault runs as a single all-in-one container (s6-overlay based).
# Replicas > 1 are not supported due to local SQLite database.
replicaCount: 1

# Container image settings
image:
  repository: ghcr.io/aliasvault/aliasvault
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# AliasVault application configuration
config:
  # Hostname used by AliasVault (must match your external domain)
  hostname: "localhost"
  # Allow public user registration
  publicRegistrationEnabled: "true"
  # Log IP addresses of users
  ipLoggingEnabled: "true"
  # Set to false when TLS is handled by an external reverse proxy (recommended)
  forceHttpsRedirect: "false"
  # Optional support email address
  supportEmail: ""
  # Comma-separated list of private email domains for email aliasing
  privateEmailDomains: ""
  # Enable TLS for SMTP
  smtpTlsEnabled: "false"
    # SMTP advertised hostname (new in AliasVault 0.28.1) - leave empty to use config.hostname
  smtpAdvertisedHostname: ""

# Secret configuration
# The DATA_PROTECTION_CERT_PASSWORD is required by AliasVault for encrypting
# its internal certificates. Set this to a secure random string.
secret:
  # Create a secret with the required keys (recommended for production)
  create: true
  # If create is false, provide the name of an existing secret
  existingSecret: ""
  # Key within the secret containing the data protection cert password
  dataProtectionCertPasswordKey: "DATA_PROTECTION_CERT_PASSWORD"
  # The actual password value (only used when secret.create is true)
  # IMPORTANT: Change this to a secure random string in production!
  dataProtectionCertPassword: "change-me-to-a-secure-random-value"

# Extra environment variables that will be pass onto deployment pods
# Expects key: value
env: {}
  # ASPNETCORE_ENVIRONMENT: Production
  # SECRET_VAR:
  #   valueFrom:
  #     secretKeyRef:
  #       name: env-secret
  #       key: secret

# Persistence configuration for AliasVault data directories
persistence:
  # Enable persistent storage (strongly recommended for production)
  enabled: true
  # Storage class name - leave empty to use the cluster default
  storageClassName: ""
  accessMode: ReadWriteOnce
  # Database storage (SQLite)
  database:
    size: 2Gi
  # Log storage
  logs:
    size: 1Gi
  # Secrets/certificates storage
  secrets:
    size: 1Gi
  # Certificate storage
  certificates:
    size: 1Gi

serviceAccount:
  # Specifies whether a service account should be created.
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  # HTTP port (main web UI)
  httpPort: 80
  # SMTP ports (only needed if using AliasVault's built-in email aliasing)
  smtp:
    enabled: false
    port: 25
    submissionPort: 587

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: aliasvault.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: aliasvault-tls
  #    hosts:
  #      - aliasvault.example.com

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
      # namespace: default
  hostnames:
    - aliasvault.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

# Liveness probe - AliasVault web UI health check
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 5

# Readiness probe
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
