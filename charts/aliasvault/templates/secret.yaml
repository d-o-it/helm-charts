{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aliasvault.secretName" . }}
  labels:
    {{- include "aliasvault.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.dataProtectionCertPasswordKey }}: {{ .Values.secret.dataProtectionCertPassword | quote }}
{{- end }}
